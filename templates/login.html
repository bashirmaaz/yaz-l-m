<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğretmen Girişi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #007bff;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .error {
            color: red;
            margin-bottom: 15px;
        }

        a {
            color: #007bff;
            text-decoration: none;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>Öğretmen Girişi</h1>

        <form method="POST">
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <input type="text" name="username" placeholder="Kullanıcı Adı (Örn: teacher1)" required>
            <input type="password" name="password" placeholder="Parola (Örn: 123456)" required>

            <button type="submit">Giriş Yap</button>
        </form>


        <a href="{{ url_for('main.register_teacher') }}">Yeni Öğretmen Hesabı Oluştur</a>
    </div>
</body>

</html>
