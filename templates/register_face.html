<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Yüz Kaydı</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        #video-container {
            margin-top: 20px;
            position: relative;
            width: 640px;
            height: 480px;
            background-color: #333;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        .controls {
            margin-top: 20px;
        }

        input[type="text"],
        button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            background-color: #fff;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .status-success {
            color: green;
            font-weight: bold;
        }

        .status-error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Öğrenci Yüz Kayıt Ekranı</h1>
        <p>Yüz tanıma sistemi için öğrenci bilgilerini girin ve yüzünü kaydedin.</p>
        <a href="{{ url_for('main.dashboard') }}">← Dashboard'a Dön</a>
        <hr>

        <div id="video-container">
            <video id="camera-feed" autoplay playsinline></video>
        </div>

        <h2>Kayıt Formu</h2>
        <div class="controls">
            <input type="text" id="onboard-school-number" placeholder="Okul Numarası">
            <input type="text" id="onboard-name" placeholder="İsim">
            <input type="text" id="onboard-surname" placeholder="Soyisim">

            <button onclick="startVideo('register')" id="start-register-camera-btn">Kamerayı Aç</button>
            <button onclick="fullRegister()" disabled id="register-button">Kaydol ve Yüzümü Kaydet</button>
        </div>

        <div id="result">
            Sonuçlar burada görünecek...
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
</body>

</html>
